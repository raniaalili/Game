<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title></title>
  <style>
    :root{
      --bg:#0b0d12;
      --muted:#a7b0c0;
      --txt:#eef2ff;
      --accent:#7c5cff;
      --good:#2ee59d;
      --bad:#ff4d6d;
      --warn:#ffcc00;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background: radial-gradient(1200px 800px at 20% 10%, #1a1f33 0%, var(--bg) 60%);
      color:var(--txt);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      line-height:1.35;
    }
    .wrap{
      max-width: 760px;
      margin: 0 auto;
      padding: 14px 14px 40px;
      padding-top: calc(14px + env(safe-area-inset-top));
      padding-bottom: calc(40px + env(safe-area-inset-bottom));
    }
    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }
    .brand{display:flex; gap:10px; align-items:center;}
    .logo{
      width:42px;height:42px;border-radius:12px;
      background: linear-gradient(135deg, var(--accent), #22c1ff);
      display:grid;place-items:center;
      box-shadow: 0 10px 24px rgba(124,92,255,.25);
      font-size:20px;
      flex:0 0 auto;
    }
    h1{margin:0;font-size:18px;letter-spacing:.6px}
    .hud{display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;}
    .pill{
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12.5px;
      color: var(--muted);
      display:flex; gap:6px; align-items:center;
      white-space:nowrap;
    }
    .pill b{color:var(--txt); font-weight:800}

    /* bouton son (compact, même style pill) */
    .soundBtn{
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color: var(--txt);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12.5px;
      cursor:pointer;
    }
    .soundBtn:active{transform:scale(.99)}

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
      position:relative;
      overflow:hidden;
    }
    .card::after{
      content:"";
      position:absolute; inset:-120px -120px auto auto;
      width:260px;height:260px;border-radius:50%;
      background: radial-gradient(circle at 30% 30%, rgba(124,92,255,.25), transparent 60%);
      pointer-events:none;
    }
    .topRow{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin-bottom:10px; flex-wrap:wrap;
    }
    .tag{
      display:inline-flex; align-items:center; gap:6px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
      padding: 6px 10px;
      border-radius: 999px;
      font-size:12px;
      color: var(--muted);
    }
    select{
      appearance:none; -webkit-appearance:none;
      background: rgba(0,0,0,.22);
      color: var(--txt);
      border:1px solid rgba(255,255,255,.10);
      border-radius: 12px;
      padding: 10px 12px;
      font-size:13px;
      max-width: 100%;
    }

    .q{font-size:18px;margin: 10px 0 12px;}
    .answers{display:grid;grid-template-columns:1fr;gap:10px;}
    button.answer{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
      color: var(--txt);
      padding: 14px 14px;
      border-radius: 14px;
      cursor:pointer;
      text-align:left;
      transition: transform .08s ease, background .15s ease, border-color .15s ease;
      font-size:15px;
      min-height: 54px;
    }
    button.answer:active{transform: scale(.99)}
    button.answer:disabled{opacity:.85; cursor:not-allowed}

    .timerRow{
      margin-top:12px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      color: var(--muted);
      font-size:12.5px;
    }
    .ring{
      width:44px;height:44px;border-radius:50%;
      border:3px solid rgba(255,255,255,.12);
      position:relative;
      display:grid;place-items:center;
      background: rgba(0,0,0,.18);
      flex:0 0 auto;
    }
    .ring::before{
      content:"";
      position:absolute; inset:-3px;
      border-radius:50%;
      background: conic-gradient(var(--warn) var(--p, 0deg), rgba(255,255,255,.10) 0);
      mask: radial-gradient(circle, transparent 58%, #000 59%);
      -webkit-mask: radial-gradient(circle, transparent 58%, #000 59%);
    }
    .ring span{position:relative; font-size:12px; color:var(--txt); font-weight:900}

    .toast{
      margin-top:12px;
      padding: 10px 12px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
      color: var(--muted);
      display:flex; gap:10px; align-items:flex-start;
      opacity:0;
      transform: translateY(6px);
      transition: opacity .18s ease, transform .18s ease;
    }
    .toast.show{opacity:1; transform: translateY(0)}
    .toast.good{border-color: rgba(46,229,157,.35)}
    .toast.bad{border-color: rgba(255,77,109,.35)}
    .toast .emoji{font-size:18px; line-height:1}
    .toast b{color:var(--txt)}

    .actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px;}
    .btn{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color: var(--txt);
      padding: 12px 12px;
      border-radius: 12px;
      cursor:pointer;
      font-size:14px;
      flex: 1 1 auto;
    }
    .btn.primary{background: rgba(124,92,255,.20); border-color: rgba(124,92,255,.50)}
    .btn.danger{background: rgba(255,77,109,.12); border-color: rgba(255,77,109,.35)}
    .btn:disabled{opacity:.6; cursor:not-allowed}

    .shake{animation: shake .36s ease-in-out both; box-shadow: 0 0 0 1px rgba(255,77,109,.35), 0 20px 55px rgba(255,77,109,.10);}
    @keyframes shake{
      0%{transform:translateX(0)}
      20%{transform:translateX(-10px)}
      40%{transform:translateX(10px)}
      60%{transform:translateX(-7px)}
      80%{transform:translateX(7px)}
      100%{transform:translateX(0)}
    }

    .overlay{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 16px;
      z-index: 999;
    }
    .overlay.show{display:flex;}
    .modal{
      width: min(560px, 100%);
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      box-shadow: 0 20px 80px rgba(0,0,0,.55);
      padding: 16px;
    }
    .modal .title{
      margin: 0 0 6px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: .2px;
    }
    .modal .sub{
      margin: 0 0 10px;
      color: var(--muted);
    }
    .modal .big{
      font-size: 34px;
      font-weight: 900;
      margin: 8px 0 6px;
    }
    .modal .meta{
      margin: 0 0 12px;
      color: var(--muted);
    }
    .modal .row{
      display:flex; gap:10px; flex-wrap:wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo">🧠</div>
      </div>
      <div class="hud">
        <button class="soundBtn" id="soundBtn" aria-label="Activer/désactiver le son">🔊</button>
        <div class="pill">Niveau <b id="lvlPct">100%</b></div>
        <div class="pill">Score <b id="score">0</b></div>
      </div>
    </header>

    <div class="card" id="card">
      <div class="topRow">
        <div class="tag" id="levelName">🦪 Cerveau d’huître</div>
        <select id="packSelect" aria-label="Choisir une partie"></select>
      </div>

      <p class="q" id="question">…</p>
      <div class="answers" id="answers"></div>

      <div class="timerRow">
        <div>Temps restant : <b id="timeLeft">--</b>s</div>
        <div class="ring" id="ring"><span id="ringTxt">--</span></div>
      </div>

      <div class="toast" id="toast">
        <div class="emoji" id="toastEmoji">✨</div>
        <div>
          <div><b id="toastTitle">Info</b></div>
          <div id="toastText">…</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn primary" id="nextBtn" disabled style="display:none">Question suivante</button>
        <button class="btn" id="giveUpBtn">give up 🫠</button>
        <button class="btn danger" id="resetBtn">Reset</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="title" id="endTitle">Terminé.</div>
      <div class="sub" id="endSub">—</div>
      <div class="big" id="endScore">0 pts</div>
      <div class="meta" id="endMeta">Niveau atteint : —</div>
      <div class="row">
        <button class="btn primary" id="replayBtn">Rejouer</button>
        <button class="btn" id="closeBtn">Fermer</button>
      </div>
    </div>
  </div>

<script>
/* ========= Config ========= */
const FIXED_SECONDS = 15;

/* ✅ TES LEVELS */
const LEVELS = [
  { pct: 100, name: "🦪 Cerveau d’huître" },
  { pct: 80,  name: "🧽 Bob l’éponge" },
  { pct: 60,  name: "🥸 Mychael Kyle Jr." },
  { pct: 40,  name: "🧠 Cerveau humain (ça va)" },
  { pct: 25,  name: "🧩 Machine" },
  { pct: 10,  name: "🤖 IA" },
  { pct: 1,   name: "👑 Tié un génie (1%)" },
];

const PACKS = [
  { id:"S1",  name:"Partie 1 — Classiques" },
  { id:"S2",  name:"Partie 2 — Alphabet" },
  { id:"S3",  name:"Partie 3 — Mois" },
  { id:"S4",  name:"Partie 4 — Rimes" },
  { id:"S10", name:"Partie 10 — Mix" },
];

const QUESTIONS = [
  { id:"S1-100-1", pack:"S1", levelPct:100, q:"Tu as 3 pommes. Tu en prends 2. Combien en as-tu ?", choices:["1","2","3","0"], answerIndex:1, explain:"Tu en prends 2 → tu en as 2." },
  { id:"S1-80-1",  pack:"S1", levelPct:80,  q:"Quel mot est différent ?", choices:["Chat","Chien","Poisson","Chaise"], answerIndex:3, explain:"Trois animaux, une chaise." },
  { id:"S1-60-1",  pack:"S1", levelPct:60,  q:"Un père a 30 ans, son fils 10 ans. Dans combien d’années le père aura-t-il le double ?", choices:["5","10","15","20"], answerIndex:1, explain:"Dans 10 ans : 40 et 20." },
  { id:"S1-40-1",  pack:"S1", levelPct:40,  q:"4 bougies allumées. Tu en souffles 1. Combien de bougies restent ?", choices:["3","4","1","0"], answerIndex:1, explain:"ça se passera mieux la prochaine fois 😬" },
  { id:"S1-25-1",  pack:"S1", levelPct:25,  q:"“Cette phrase est fausse.” C’est…", choices:["Toujours vrai","Toujours faux","Un paradoxe","Une preuve"], answerIndex:2, explain:"C’est le paradoxe du menteur." },
  { id:"S1-10-1",  pack:"S1", levelPct:10,  q:"Escargot dans un puits de 10 m. +3 m le jour, -2 m la nuit. En combien de jours sort-il ?", choices:["8","10","7","9"], answerIndex:0, explain:"Jour 8 : il sort avant de redescendre." },
  { id:"S1-1-1",   pack:"S1", levelPct:1,   q:"Horloge à 3h15. Angle le plus petit entre aiguilles ?", choices:["0°","7,5°","15°","22,5°"], answerIndex:1, explain:"Minute 90°, heure 97,5° → 7,5°." },

  { id:"S2-100-1", pack:"S2", levelPct:100, q:"Quelle lettre vient juste après A ?", choices:["B","C","Z","AA"], answerIndex:0, explain:"B." },
  { id:"S2-80-1",  pack:"S2", levelPct:80,  q:"Quel mot contient le plus de lettres ?", choices:["AA","BBB","CCCC","DD"], answerIndex:2, explain:"“CCCC” contient 4 lettres." },
  { id:"S2-60-1",  pack:"S2", levelPct:60,  q:"Combien y a-t-il de lettres dans l’alphabet français ?", choices:["24","25","26","27"], answerIndex:2, explain:"26." },
  { id:"S2-40-1",  pack:"S2", levelPct:40,  q:"Quelle lettre est au milieu de l’alphabet (26 lettres) ?", choices:["M","N","M et N","L"], answerIndex:2, explain:"M (13e) et N (14e)." },
  { id:"S2-25-1",  pack:"S2", levelPct:25,  q:"Quelle suite est correcte ?", choices:["A C B","A B C","B A C","C B A"], answerIndex:1, explain:"A B C." },
  { id:"S2-10-1",  pack:"S2", levelPct:10,  q:"Quel mot est en ordre alphabétique ?", choices:["BAG","ABE","ACB","BAE"], answerIndex:1, explain:"A-B-E est dans l’ordre." },
  { id:"S2-1-1",   pack:"S2", levelPct:1,   q:"Dans l’alphabet, combien de positions sont paires (1 à 26) ?", choices:["12","13","14","26"], answerIndex:1, explain:"13 positions paires." },

  { id:"S3-100-1", pack:"S3", levelPct:100, q:"Quel mois vient après janvier ?", choices:["Février","Décembre","Mars","Juin"], answerIndex:0, explain:"Février." },
  { id:"S3-80-1",  pack:"S3", levelPct:80,  q:"Quel mois a 28 jours ?", choices:["Février","Tous","Aucun","Janvier"], answerIndex:1, explain:"Tous les mois ont au moins 28 jours." },
  { id:"S3-60-1",  pack:"S3", levelPct:60,  q:"Combien de mois ont 31 jours ?", choices:["5","6","7","8"], answerIndex:2, explain:"7 mois." },
  { id:"S3-40-1",  pack:"S3", levelPct:40,  q:"Quel est le 9e mois ?", choices:["Août","Septembre","Octobre","Juillet"], answerIndex:1, explain:"Septembre." },
  { id:"S3-25-1",  pack:"S3", levelPct:25,  q:"Quel mois contient la lettre “é” ?", choices:["Février","Avril","Mai","Juin"], answerIndex:0, explain:"Février." },
  { id:"S3-10-1",  pack:"S3", levelPct:10,  q:"Quel mois a exactement 4 lettres ?", choices:["Mars","Juin","Août","Mai"], answerIndex:0, explain:"Mars = 4 lettres." },
  { id:"S3-1-1",   pack:"S3", levelPct:1,   q:"Combien de lettres dans “septembre” ?", choices:["8","9","10","11"], answerIndex:2, explain:"septembre = 10 lettres." },

  { id:"S4-100-1", pack:"S4", levelPct:100, q:"Quel mot rime le mieux avec “chat” ?", choices:["plat","chou","chien","lune"], answerIndex:0, explain:"chat / plat." },
  { id:"S4-80-1",  pack:"S4", levelPct:80,  q:"Quel mot rime avec “manger” ?", choices:["danger","montagne","manteau","mardi"], answerIndex:0, explain:"manger / danger." },
  { id:"S4-60-1",  pack:"S4", levelPct:60,  q:"Quel mot rime avec “Paris” ?", choices:["souris","pardon","pays","parfait"], answerIndex:0, explain:"Paris / souris." },
  { id:"S4-40-1",  pack:"S4", levelPct:40,  q:"Dans quelle paire les deux mots riment ?", choices:["mer / mur","chat / chaud","lait / laid","pied / peur"], answerIndex:2, explain:"lait / laid (même son)." },
  { id:"S4-25-1",  pack:"S4", levelPct:25,  q:"Quel mot NE rime PAS avec “beau” ?", choices:["bateau","niveau","cadeau","chaud"], answerIndex:1, explain:"niveau ≠ beau (son différent)." },
  { id:"S4-10-1",  pack:"S4", levelPct:10,  q:"Quel mot rime avec “orange” ?", choices:["ange","mange","aucun","range"], answerIndex:2, explain:"Piège : rien ne rime parfaitement avec “orange” (standard)." },
  { id:"S4-1-1",   pack:"S4", levelPct:1,   q:"Quel couple a exactement le même son final ?", choices:["temps / tant","vers / verre","mais / met","deux / due"], answerIndex:1, explain:"vers / verre (homophones)." },

  { id:"S10-100-1", pack:"S10", levelPct:100, q:"Si tu doubles 5, tu obtiens…", choices:["10","12","15","20"], answerIndex:0, explain:"10." },
  { id:"S10-80-1",  pack:"S10", levelPct:80,  q:"Quel nombre manque : 2, 4, 6, __ ?", choices:["7","8","9","10"], answerIndex:1, explain:"+2." },
  { id:"S10-60-1",  pack:"S10", levelPct:60,  q:"Lequel est un palindrome ?", choices:["kayak","bonjour","paris","table"], answerIndex:0, explain:"kayak." },
  { id:"S10-40-1",  pack:"S10", levelPct:40,  q:"10 bonbons, tu en donnes 10. Il reste…", choices:["0","10","1","Ça dépend"], answerIndex:0, explain:"0." },
  { id:"S10-25-1",  pack:"S10", levelPct:25,  q:"Quel mot est le plus long ?", choices:["long","plus long","le plus long","longueur"], answerIndex:2, explain:"“le plus long” (piège)." },
  { id:"S10-10-1",  pack:"S10", levelPct:10,  q:"Quel jour vient 2 jours après lundi ?", choices:["Mardi","Mercredi","Jeudi","Dimanche"], answerIndex:1, explain:"Mercredi." },
  { id:"S10-1-1",   pack:"S10", levelPct:1,   q:"Combien de A dans “ABRACADABRA” ?", choices:["4","5","6","7"], answerIndex:2, explain:"6." },
];

/* ========= Helpers ========= */
const $ = (id)=>document.getElementById(id);
function level(){ return LEVELS[state.levelIndex]; }
function pointsForLevel(pct){ return Math.round(900 / Math.max(4, pct)); }
function pickRandom(arr, lastId){
  if(arr.length === 0) return null;
  const filtered = arr.filter(x => x.id !== lastId);
  const pool = filtered.length ? filtered : arr;
  return pool[Math.floor(Math.random()*pool.length)];
}

/* ========= AUDIO ========= */
let audioCtx = null;
let tickTimer = null;
let soundOn = true;

function initAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === "suspended") audioCtx.resume();
}

function stopTicking(){
  if(tickTimer){
    clearTimeout(tickTimer);
    tickTimer = null;
  }
}

function playTick(){
  if(!soundOn) return;
  try{
    initAudio();
    const t = audioCtx.currentTime;

    // "tic" plus rond : triangle + mini enveloppe
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();

    o.type = "triangle";
    // fréquence variable: plus grave au début, un peu plus haute à la fin
    const prog = 1 - (state.tLeft / state.tMax); // 0 -> 1
    const freq = 520 + prog * 180;               // 520 -> 700
    o.frequency.setValueAtTime(freq, t);

    // enveloppe très courte (pas de "clac" violent)
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.10, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);

    o.connect(g).connect(audioCtx.destination);
    o.start(t);
    o.stop(t + 0.08);
  }catch(e){}
}
function playConfirmDing(){
  if(!soundOn) return;
  try{
    initAudio();
    const t = audioCtx.currentTime;

    // petit "ding" propre
    const freqs = [880, 1174.66]; // A5 -> D6
    freqs.forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "sine";
      o.frequency.setValueAtTime(f, t + i * 0.03);

      g.gain.setValueAtTime(0.0001, t + i * 0.03);
      g.gain.exponentialRampToValueAtTime(0.14, t + i * 0.03 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.03 + 0.12);

      o.connect(g).connect(audioCtx.destination);
      o.start(t + i * 0.03);
      o.stop(t + i * 0.03 + 0.13);
    });
  }catch(e){}
}

function playRestartWhoosh(){
  if(!soundOn) return;
  try{
    initAudio();
    const t = audioCtx.currentTime;

    // "woosh" doux (filtre qui descend) = vibe reset/restart
    const noise = audioCtx.createBufferSource();
    const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.18, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<data.length;i++){
      data[i] = (Math.random()*2-1) * (1 - i/data.length); // décroissant
    }
    noise.buffer = buffer;

    const filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.setValueAtTime(1400, t);
    filter.frequency.exponentialRampToValueAtTime(350, t + 0.18);

    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.18, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.20);

    noise.connect(filter).connect(g).connect(audioCtx.destination);
    noise.start(t);
    noise.stop(t + 0.20);

    // petit "tap" final discret
    const o = audioCtx.createOscillator();
    const tg = audioCtx.createGain();
    o.type = "triangle";
    o.frequency.setValueAtTime(520, t + 0.14);
    tg.gain.setValueAtTime(0.0001, t + 0.14);
    tg.gain.exponentialRampToValueAtTime(0.10, t + 0.15);
    tg.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
    o.connect(tg).connect(audioCtx.destination);
    o.start(t + 0.14);
    o.stop(t + 0.23);
  }catch(e){}
}
function startTicking(){
  stopTicking();

  const loop = () => {
    if(state.gameOver || state.locked || !soundOn) return;

    // tic
    playTick();

    // rythme TV :
    // - au début : 1 tic / seconde
    // - ensuite : accélère doucement
    // - dernières secondes : plus pressant
    let delay = 1000;

    if(state.tLeft <= 5){
      delay = 420;               // stress TV
    } else if(state.tLeft <= 8){
      delay = 700;
    } else if(state.tLeft <= 12){
      delay = 900;
    } else {
      delay = 1000;
    }

    tickTimer = setTimeout(loop, delay);
  };

  loop();
}

function playBeep(){
  if(!soundOn) return;
  try{
    initAudio();
    const t = audioCtx.currentTime;

    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = "sine";
    o.frequency.setValueAtTime(1100, t);

    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.12, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);

    o.connect(g).connect(audioCtx.destination);
    o.start(t);
    o.stop(t + 0.13);
  }catch(e){}
}

function playCorrectDing(){
  if(!soundOn) return;
  try{
    initAudio();
    const t = audioCtx.currentTime;

    // petit "ding" : 2 notes rapides (type UI satisfaisante)
    const freqs = [880, 1174.66]; // A5 -> D6
    freqs.forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "sine";
      o.frequency.setValueAtTime(f, t + i * 0.03);

      g.gain.setValueAtTime(0.0001, t + i * 0.03);
      g.gain.exponentialRampToValueAtTime(0.14, t + i * 0.03 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.03 + 0.12);

      o.connect(g).connect(audioCtx.destination);
      o.start(t + i * 0.03);
      o.stop(t + i * 0.03 + 0.13);
    });
  }catch(e){}
}

function playLoseMelodrama(){
  if(!soundOn) return;
  try{
    initAudio();
    const t = audioCtx.currentTime;

    // boom grave
    const boom = audioCtx.createOscillator();
    const bg = audioCtx.createGain();
    boom.type = "sine";
    boom.frequency.setValueAtTime(90, t);
    boom.frequency.exponentialRampToValueAtTime(40, t + 0.35);

    bg.gain.setValueAtTime(0.0001, t);
    bg.gain.exponentialRampToValueAtTime(0.35, t + 0.02);
    bg.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);

    boom.connect(bg).connect(audioCtx.destination);
    boom.start(t);
    boom.stop(t + 0.5);

    // accord triste qui descend
    const freqs = [440, 349.23, 261.63];
    freqs.forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "sine";
      o.frequency.setValueAtTime(f, t + 0.02);
      o.frequency.exponentialRampToValueAtTime(f * 0.72, t + 0.75);

      g.gain.setValueAtTime(0.0001, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.12, t + 0.06);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.85);

      o.connect(g).connect(audioCtx.destination);
      o.start(t + 0.02 + i * 0.03);
      o.stop(t + 0.9);
    });
  }catch(e){}
}

function playWinHappy(){
  if(!soundOn) return;
  try{
    initAudio();
    const t = audioCtx.currentTime;

    const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
    notes.forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "triangle";
      o.frequency.setValueAtTime(f, t + i * 0.09);

      g.gain.setValueAtTime(0.0001, t + i * 0.09);
      g.gain.exponentialRampToValueAtTime(0.18, t + i * 0.09 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.09 + 0.14);

      o.connect(g).connect(audioCtx.destination);
      o.start(t + i * 0.09);
      o.stop(t + i * 0.09 + 0.16);
    });

    // sparkle
    const s = audioCtx.createOscillator();
    const sg = audioCtx.createGain();
    s.type = "sine";
    s.frequency.setValueAtTime(1400, t + 0.42);
    s.frequency.exponentialRampToValueAtTime(2200, t + 0.55);

    sg.gain.setValueAtTime(0.0001, t + 0.42);
    sg.gain.exponentialRampToValueAtTime(0.12, t + 0.46);
    sg.gain.exponentialRampToValueAtTime(0.0001, t + 0.62);

    s.connect(sg).connect(audioCtx.destination);
    s.start(t + 0.42);
    s.stop(t + 0.65);
  }catch(e){}
}

/* ========= State ========= */
let state = {
  packId: "S1",
  levelIndex: 0,
  score: 0,
  streak: 0,
  locked: false,
  timer: null,
  tLeft: FIXED_SECONDS,
  tMax: FIXED_SECONDS,
  current: null,
  lastQid: null,
  gameOver: false,
};

function updateHud(){
  $("lvlPct").textContent = `${level().pct}%`;
  $("score").textContent = state.score;
  $("levelName").textContent = level().name;
}

function showToast(type, title, text){
  const toast = $("toast");
  toast.classList.remove("good","bad","show");
  toast.classList.add(type === "good" ? "good" : "bad");
  $("toastEmoji").textContent = type === "good" ? "✅" : "😵‍💫";
  $("toastTitle").textContent = title;
  $("toastText").textContent = text;
  requestAnimationFrame(()=>toast.classList.add("show"));
}
function clearToast(){ $("toast").classList.remove("show","good","bad"); }

function setRing(){
  const p = state.tMax <= 0 ? 0 : (state.tLeft / state.tMax);
  const deg = Math.max(0, Math.min(1, p)) * 360;
  $("ring").style.setProperty("--p", `${deg}deg`);
  $("ringTxt").textContent = state.tLeft;
  $("timeLeft").textContent = state.tLeft;
}

function lockAnswers(){
  document.querySelectorAll("button.answer").forEach(b=>b.disabled=true);
}

function stopTimer(){
  if(state.timer){ clearInterval(state.timer); state.timer=null; }
  stopTicking();
}

function startTimer(){
  stopTimer();
  state.tMax = FIXED_SECONDS;
  state.tLeft = FIXED_SECONDS;
  setRing();

  startTicking();

  state.timer = setInterval(()=>{
    state.tLeft -= 1;
    if(state.tLeft <= 3 && state.tLeft > 0){
  playBeep();
  }
    setRing();
    if(state.tLeft <= 0){
      stopTimer();
      if(!state.locked && !state.gameOver) timeoutFail();
    }
  }, 1000);
}

/* Pool robuste */
function getPool(){
  const pct = level().pct;

  const inPack = QUESTIONS.filter(q => q.pack === state.packId && q.levelPct === pct);
  const inMix  = QUESTIONS.filter(q => q.pack === "S10" && q.levelPct === pct);
  const allLvl = QUESTIONS.filter(q => q.levelPct === pct);

  let pool = [...inPack];

  const addIfMissing = (arr) => {
    for (const q of arr){
      if (!pool.some(x => x.id === q.id)) pool.push(q);
      if (pool.length >= 6) break;
    }
  };

  if (pool.length < 3) addIfMissing(inMix);
  if (pool.length < 3) addIfMissing(allLvl);

  return pool;
}

function renderQuestion(){
  if(state.gameOver) return;

  state.locked = false;
  clearToast();

  const pool = getPool();
  const q = pickRandom(pool, state.lastQid);
  state.current = q;
  state.lastQid = q ? q.id : null;

  if(!q){
    $("question").textContent = "Pas de questions pour ce niveau. (On va en ajouter 😈)";
    $("answers").innerHTML = "";
    return;
  }

  $("question").textContent = q.q;
  const answersDiv = $("answers");
  answersDiv.innerHTML = "";

  q.choices.forEach((txt, idx)=>{
    const btn = document.createElement("button");
    btn.className = "answer";
    btn.textContent = txt;
    btn.onclick = ()=>choose(idx, btn);
    answersDiv.appendChild(btn);
  });

  updateHud();
  startTimer();
}

function promoteSilently(){
  if(state.levelIndex < LEVELS.length - 1 && state.streak >= 2){
    state.levelIndex++;
    state.streak = 0;
    updateHud();
  }
}

function drama(){
  const card = $("card");
  card.classList.remove("shake");
  void card.offsetWidth;
  card.classList.add("shake");
}

/* ===== Fin de partie ===== */
function endRun({kind, title, sub, scoreText}){
  state.gameOver = true;
  stopTimer();
  lockAnswers();

  if(kind === "win") playWinHappy();
  else playLoseMelodrama();

  $("endTitle").textContent = title;
  $("endSub").textContent = sub;
  $("endScore").textContent = scoreText;
  $("endMeta").textContent = `Niveau atteint : ${level().name}`;

  $("overlay").classList.add("show");
}

function autoNext(){
  setTimeout(() => renderQuestion(), 650);
}

function choose(choiceIndex, btn){
  if(state.locked || state.gameOver) return;
  state.locked = true;
  stopTimer();
  lockAnswers();

  const ok = (choiceIndex === state.current.answerIndex);

  if(ok){
    const gain = pointsForLevel(level().pct) + Math.floor(state.tLeft);
    state.score += gain;
    state.streak += 1;

    btn.style.borderColor = "rgba(46,229,157,.6)";
    btn.style.background = "rgba(46,229,157,.10)";

    // WIN au 1%
    if(level().pct === 1){
      showToast("good","Correct ✅", `${state.current.explain} (+${gain} pts)`);
      updateHud();
      setTimeout(() => {
        endRun({
          kind: "win",
          title: "Trop fort le S ! 😎",
          sub: "T’as terminé la run.",
          scoreText: `${state.score} pts`
        });
      }, 650);
      return;
    }

    promoteSilently();
showToast("good","Correct ✅", `${state.current.explain} (+${gain} pts)`);
if(level().pct !== 1) playCorrectDing();
updateHud();
autoNext();
  }else{
    state.streak = 0;

    btn.style.borderColor = "rgba(255,77,109,.6)";
    btn.style.background = "rgba(255,77,109,.10)";

    const buttons = [...document.querySelectorAll("button.answer")];
    const goodBtn = buttons[state.current.answerIndex];
    if(goodBtn){
      goodBtn.style.borderColor = "rgba(46,229,157,.55)";
      goodBtn.style.background = "rgba(46,229,157,.08)";
    }

    drama();
    showToast("bad","Aïe, aïe, aïe", state.current.explain);
    updateHud();

    setTimeout(() => {
      endRun({
        kind: "lose",
        title: "Aïe, aïe, aïe",
        sub: "Run terminée (1 erreur = fin).",
        scoreText: `${state.score} pts`
      });
    }, 650);
  }
}

function timeoutFail(){
  if(state.gameOver) return;
  state.locked = true;
  lockAnswers();
  state.streak = 0;

  const good = state.current?.choices?.[state.current.answerIndex] ?? "—";
  drama();
  showToast("bad","Aïe, aïe, aïe", `Temps écoulé ⏱️ (Réponse : "${good}")`);
  updateHud();

  setTimeout(() => {
    endRun({
      kind: "lose",
      title: "Temps écoulé ⏱️",
      sub: "Run terminée (1 erreur = fin).",
      scoreText: `${state.score} pts`
    });
  }, 650);
}

function giveUp(){
  if(state.locked || state.gameOver) return;
  state.locked = true;
  stopTimer();
  lockAnswers();
  state.streak = 0;
  showToast("bad","give up 🫠", "Ok. On passe à la suivante.");
  updateHud();
  autoNext();
}

function resetRun(){
  stopTimer();
  state.levelIndex = 0;
  state.score = 0;
  state.streak = 0;
  state.locked = false;
  state.lastQid = null;
  state.current = null;
  state.gameOver = false;
  clearToast();
  $("overlay").classList.remove("show");
  updateHud();
  renderQuestion();
}

function initPacks(){
  const sel = $("packSelect");
  sel.innerHTML = "";
  PACKS.forEach(p=>{
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = p.name;
    sel.appendChild(opt);
  });
  sel.value = state.packId;
  sel.addEventListener("change", ()=>{
    state.packId = sel.value;
    resetRun();
  });
}

function toggleSound(){
  soundOn = !soundOn;
  $("soundBtn").textContent = soundOn ? "🔊" : "🔇";
  if(!soundOn) stopTicking();
}

function start(){
  initPacks();
  updateHud();
  renderQuestion();


  

  $("replayBtn").addEventListener("click", ()=>{
  playConfirmDing();
  resetRun();
});
  $("giveUpBtn").addEventListener("click", ()=>{
  playRestartWhoosh();
  giveUp();
});

$("resetBtn").addEventListener("click", ()=>{
  playRestartWhoosh();
  resetRun();
});

$("closeBtn").addEventListener("click", ()=>{
  playRestartWhoosh();
  $("overlay").classList.remove("show");
});

  $("soundBtn").addEventListener("click", (e)=>{
    e.stopPropagation();
    toggleSound();
  });

  // iOS: autoriser audio au premier tap
  document.addEventListener("pointerdown", ()=>{ try{ initAudio(); }catch(e){} }, {once:true});
}

document.addEventListener("DOMContentLoaded", start);
</script>
