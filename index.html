<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title></title>

<style>
:root{
  --bg:#0b0d12;
  --txt:#eef2ff;
  --muted:#a7b0c0;
  --good:#2ee59d;
  --bad:#ff4d6d;
}
*{box-sizing:border-box}
body{
  margin:0;
  background: radial-gradient(1200px 800px at 20% 10%, #1a1f33 0%, var(--bg) 60%);
  color:var(--txt);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
}
.wrap{
  max-width:700px;
  margin:auto;
  padding:20px;
}
.pill{
  background:rgba(255,255,255,.08);
  padding:8px 12px;
  border-radius:999px;
  font-size:14px;
  display:inline-block;
  margin-right:8px;
}
.card{
  margin-top:20px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,.05);
}
.q{font-size:20px;margin-bottom:15px;}
.answers button{
  width:100%;
  margin-bottom:10px;
  padding:14px;
  border-radius:14px;
  border:none;
  background:#1b2033;
  color:white;
  font-size:15px;
}
.answers button:disabled{opacity:.7}
.toast{
  margin-top:15px;
  padding:12px;
  border-radius:14px;
  display:none;
}
.toast.good{background:rgba(46,229,157,.15)}
.toast.bad{background:rgba(255,77,109,.15)}
.final{
  text-align:center;
  margin-top:30px;
}
button.reset{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:14px;
  background:#ff4d6d;
  color:white;
  font-size:15px;
}
</style>
</head>
<body>
<div class="wrap">

<div>
  <span class="pill">Niveau <b id="lvlPct">100%</b></span>
  <span class="pill">Score <b id="score">0</b></span>
</div>

<div class="card" id="gameCard">
  <div class="pill" id="levelName"></div>
  <div class="q" id="question"></div>
  <div class="answers" id="answers"></div>
  <div class="toast" id="toast"></div>
</div>

<div class="final" id="finalScreen" style="display:none">
  <h2>💀 GAME OVER</h2>
  <p>Score final : <b id="finalScore"></b></p>
  <p>Niveau atteint : <b id="finalLevel"></b></p>
  <button class="reset" onclick="resetGame()">Rejouer</button>
</div>

</div>

<script>

/* =========================
   NOUVEAUX LEVELS
========================= */
const LEVELS = [
  { pct: 100, name: "🦪 Cerveau d’huître" },
  { pct: 80,  name: "🧽 Bob l’éponge" },
  { pct: 60,  name: "🥸 Mychael Kyle Jr." },
  { pct: 40,  name: "🧠 Cerveau humain (ça va)" },
  { pct: 25,  name: "🧩 Machine" },
  { pct: 10,  name: "🤖 IA" },
  { pct: 1,   name: "👑 Tié un génie (1%)" },
];

const QUESTIONS = [
  { level:100, q:"Tu as 3 pommes. Tu en prends 2. Combien en as-tu ?", a:["1","2","3","0"], c:1 },
  { level:80, q:"Quel mot est différent ?", a:["Chat","Chien","Poisson","Chaise"], c:3 },
  { level:60, q:"Un père a 30 ans, son fils 10 ans. Dans combien d’années le père aura le double ?", a:["5","10","15","20"], c:1 },
  { level:40, q:"4 bougies allumées. Tu en souffles 1. Combien restent ?", a:["3","4","1","0"], c:1 },
  { level:25, q:"“Cette phrase est fausse.” C’est…", a:["Vrai","Faux","Un paradoxe","Une preuve"], c:2 },
  { level:10, q:"Escargot puits 10m (+3 -2). Combien de jours ?", a:["8","10","7","9"], c:0 },
  { level:1, q:"Angle à 3h15 ?", a:["0°","7,5°","15°","22,5°"], c:1 },
];

let state = {
  levelIndex:0,
  score:0,
  current:null,
  gameOver:false
};

function getQuestion(){
  const lvl = LEVELS[state.levelIndex].pct;
  return QUESTIONS.find(q=>q.level===lvl);
}

function render(){
  const lvl = LEVELS[state.levelIndex];
  document.getElementById("lvlPct").innerText = lvl.pct+"%";
  document.getElementById("score").innerText = state.score;
  document.getElementById("levelName").innerText = lvl.name;

  const q = getQuestion();
  state.current = q;
  document.getElementById("question").innerText = q.q;

  const answers = document.getElementById("answers");
  answers.innerHTML="";
  q.a.forEach((txt,i)=>{
    const btn=document.createElement("button");
    btn.innerText=txt;
    btn.onclick=()=>choose(i);
    answers.appendChild(btn);
  });
}

function choose(index){
  if(state.gameOver) return;

  if(index===state.current.c){
    state.score+=Math.floor(1000/LEVELS[state.levelIndex].pct);
    if(state.levelIndex<LEVELS.length-1){
      state.levelIndex++;
      render();
    }else{
      endGame(true);
    }
  }else{
    endGame(false);
  }
}

function endGame(win){
  state.gameOver=true;
  document.getElementById("gameCard").style.display="none";
  document.getElementById("finalScreen").style.display="block";
  document.getElementById("finalScore").innerText=state.score;
  document.getElementById("finalLevel").innerText=LEVELS[state.levelIndex].name;
}

function resetGame(){
  state={levelIndex:0,score:0,current:null,gameOver:false};
  document.getElementById("gameCard").style.display="block";
  document.getElementById("finalScreen").style.display="none";
  render();
}

render();

</script>
</body>
</html>
