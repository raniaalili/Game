<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>COGITRON</title>
  <style>
    :root{
      --bg:#0b0d12;
      --card:#121622;
      --muted:#a7b0c0;
      --txt:#eef2ff;
      --accent:#7c5cff;
      --good:#2ee59d;
      --bad:#ff4d6d;
      --warn:#ffcc00;
      --line:#232a3a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background: radial-gradient(1200px 800px at 20% 10%, #1a1f33 0%, var(--bg) 60%);
      color:var(--txt);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      line-height:1.35;
    }
    .wrap{
      max-width: 760px;
      margin: 0 auto;
      padding: 14px 14px 40px;
      padding-top: calc(14px + env(safe-area-inset-top));
      padding-bottom: calc(40px + env(safe-area-inset-bottom));
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }
    .brand{
      display:flex; gap:10px; align-items:center;
    }
    .logo{
      width:42px;height:42px;border-radius:12px;
      background: linear-gradient(135deg, var(--accent), #22c1ff);
      display:grid;place-items:center;
      box-shadow: 0 10px 24px rgba(124,92,255,.25);
      font-size:20px;
      flex:0 0 auto;
    }
    h1{
      margin:0;
      font-size:18px;
      letter-spacing:.6px;
    }
    .hud{
      display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;
    }
    .pill{
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12.5px;
      color: var(--muted);
      display:flex; gap:6px; align-items:center;
      white-space:nowrap;
    }
    .pill b{color:var(--txt); font-weight:700}

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
      position:relative;
      overflow:hidden;
    }
    .card::after{
      content:"";
      position:absolute; inset:-120px -120px auto auto;
      width:260px;height:260px;border-radius:50%;
      background: radial-gradient(circle at 30% 30%, rgba(124,92,255,.25), transparent 60%);
      pointer-events:none;
    }

    .topRow{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .tag{
      display:inline-flex; align-items:center; gap:6px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
      padding: 6px 10px;
      border-radius: 999px;
      font-size:12px;
      color: var(--muted);
    }

    .picker{
      display:flex; gap:8px; align-items:center; flex-wrap:wrap;
      justify-content:flex-end;
    }
    select{
      appearance:none;
      -webkit-appearance:none;
      background: rgba(0,0,0,.22);
      color: var(--txt);
      border:1px solid rgba(255,255,255,.10);
      border-radius: 12px;
      padding: 10px 12px;
      font-size:13px;
    }

    .q{
      font-size:18px;
      margin: 10px 0 12px;
    }

    .answers{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    button.answer{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
      color: var(--txt);
      padding: 14px 14px;
      border-radius: 14px;
      cursor:pointer;
      text-align:left;
      transition: transform .08s ease, background .15s ease, border-color .15s ease;
      font-size:15px;
      min-height: 54px;
    }
    button.answer:active{transform: scale(.99)}
    button.answer:disabled{opacity:.8; cursor:not-allowed}

    .timerRow{
      margin-top:12px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      color: var(--muted);
      font-size:12.5px;
    }
    .ring{
      width:44px;height:44px;border-radius:50%;
      border:3px solid rgba(255,255,255,.12);
      position:relative;
      display:grid;place-items:center;
      background: rgba(0,0,0,.18);
      flex:0 0 auto;
    }
    .ring::before{
      content:"";
      position:absolute; inset:-3px;
      border-radius:50%;
      background: conic-gradient(var(--warn) var(--p, 0deg), rgba(255,255,255,.10) 0);
      mask: radial-gradient(circle, transparent 58%, #000 59%);
      -webkit-mask: radial-gradient(circle, transparent 58%, #000 59%);
    }
    .ring span{position:relative; font-size:12px; color:var(--txt); font-weight:800}

    .toast{
      margin-top:12px;
      padding: 10px 12px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
      color: var(--muted);
      display:flex; gap:10px; align-items:flex-start;
      opacity:0;
      transform: translateY(6px);
      transition: opacity .18s ease, transform .18s ease;
    }
    .toast.show{opacity:1; transform: translateY(0)}
    .toast.good{border-color: rgba(46,229,157,.35)}
    .toast.bad{border-color: rgba(255,77,109,.35)}
    .toast .emoji{font-size:18px; line-height:1}
    .toast b{color:var(--txt)}

    .actions{
      display:flex; gap:10px; flex-wrap:wrap; margin-top:12px;
    }
    .btn{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color: var(--txt);
      padding: 12px 12px;
      border-radius: 12px;
      cursor:pointer;
      font-size:14px;
      flex: 1 1 auto;
    }
    .btn.primary{background: rgba(124,92,255,.20); border-color: rgba(124,92,255,.50)}
    .btn.danger{background: rgba(255,77,109,.12); border-color: rgba(255,77,109,.35)}
    .btn:disabled{opacity:.6; cursor:not-allowed}

    /* Dramatic fail animation */
    .shake{
      animation: shake .36s ease-in-out both;
      box-shadow: 0 0 0 1px rgba(255,77,109,.35), 0 20px 55px rgba(255,77,109,.10);
    }
    @keyframes shake{
      0%{transform:translateX(0)}
      20%{transform:translateX(-10px)}
      40%{transform:translateX(10px)}
      60%{transform:translateX(-7px)}
      80%{transform:translateX(7px)}
      100%{transform:translateX(0)}
    }

    .fadeIn{animation: fadeIn .18s ease both}
    @keyframes fadeIn{from{opacity:0; transform: translateY(4px)} to{opacity:1; transform:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo">🧠</div>
        <div>
          <h1>COGITRON</h1>
        </div>
      </div>
      <div class="hud">
        <div class="pill">Niveau <b id="lvlPct">100%</b></div>
        <div class="pill">Score <b id="score">0</b></div>
      </div>
    </header>

    <div class="card fadeIn" id="card">
      <div class="topRow">
        <div class="tag" id="levelName">🦪 Cerveau d’huître</div>
        <div class="picker">
          <select id="packSelect" aria-label="Choisir une partie"></select>
        </div>
      </div>

      <p class="q" id="question">Chargement…</p>
      <div class="answers" id="answers"></div>

      <div class="timerRow">
        <div>Temps restant : <b id="timeLeft">--</b>s</div>
        <div class="ring" id="ring"><span id="ringTxt">--</span></div>
      </div>

      <div class="toast" id="toast">
        <div class="emoji" id="toastEmoji">✨</div>
        <div>
          <div><b id="toastTitle">Info</b></div>
          <div id="toastText">…</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn primary" id="nextBtn" disabled>Question suivante</button>
        <button class="btn" id="giveUpBtn">give up 🫠</button>
        <button class="btn danger" id="resetBtn">Reset</button>
      </div>
    </div>
  </div>

<script>
/** -------------------------
 *  CONFIG
 *  ------------------------- */
const FIXED_SECONDS = 15; // même chrono pour toutes les questions

const LEVELS = [
  { pct: 100, name: "🦪 Cerveau d’huître" },
  { pct: 80,  name: "🧽 Bob l’éponge en PLS" },
  { pct: 60,  name: "🧃 Nabilla en contrôle qualité" },
  { pct: 40,  name: "🧠 Cerveau humain (ça va)" },
  { pct: 25,  name: "🧩 Déduction machine" },
  { pct: 10,  name: "🧪 Prof de logique sadique" },
  { pct: 1,   name: "👑 Génie (1%)" },
];

/** -------------------------
 *  QUESTION PACKS (10 parties)
 *  Each pack: questions grouped by levelPct
 *  ------------------------- */
const PACKS = [
  { id:"S1", name:"Partie 1 — Classiques piégeux" },
  { id:"S2", name:"Partie 2 — Alphabet & lettres" },
  { id:"S3", name:"Partie 3 — Mois & calendrier" },
  { id:"S4", name:"Partie 4 — Rimes & sonorités" },
  { id:"S5", name:"Partie 5 — Observation" },
  { id:"S6", name:"Partie 6 — Chrono méchant" },
  { id:"S7", name:"Partie 7 — Mini-maths" },
  { id:"S8", name:"Partie 8 — Logique de phrase" },
  { id:"S9", name:"Partie 9 — Faux amis" },
  { id:"S10",name:"Partie 10 — Finale (mix)" },
];

// Question format: {id, pack, levelPct, q, choices[4], answerIndex, explain}
const QUESTIONS = [
  // ----- Partie 1
  { id:"S1-100-1", pack:"S1", levelPct:100, q:"Tu as 3 pommes. Tu en prends 2. Combien en as-tu ?", choices:["1","2","3","0"], answerIndex:1, explain:"Tu en prends 2 → tu en as 2." },
  { id:"S1-80-1", pack:"S1", levelPct:80, q:"Quel mot est différent ?", choices:["Chat","Chien","Poisson","Chaise"], answerIndex:3, explain:"Trois animaux, une chaise." },
  { id:"S1-60-1", pack:"S1", levelPct:60, q:"Un père a 30 ans, son fils 10 ans. Dans combien d’années le père aura-t-il le double ?", choices:["5","10","15","20"], answerIndex:1, explain:"Dans 10 ans : 40 et 20." },
  { id:"S1-40-1", pack:"S1", levelPct:40, q:"4 bougies allumées. Tu en souffles 1. Combien de bougies restent ?", choices:["3","4","1","0"], answerIndex:1, explain:"ça se passera mieux la prochaine fois 😬" },
  { id:"S1-25-1", pack:"S1", levelPct:25, q:"“Cette phrase est fausse.” C’est…", choices:["Toujours vrai","Toujours faux","Un paradoxe","Une preuve"], answerIndex:2, explain:"C’est le paradoxe du menteur." },
  { id:"S1-10-1", pack:"S1", levelPct:10, q:"Escargot dans un puits de 10 m. +3 m le jour, -2 m la nuit. En combien de jours sort-il ?", choices:["8","10","7","9"], answerIndex:0, explain:"Jour 8 : il sort avant de redescendre." },
  { id:"S1-1-1", pack:"S1", levelPct:1, q:"Horloge à 3h15. Angle le plus petit entre aiguilles ?", choices:["0°","7,5°","15°","22,5°"], answerIndex:1, explain:"Minute 90°, heure 97,5° → 7,5°." },

  // ----- Partie 2 (Alphabet)
  { id:"S2-100-1", pack:"S2", levelPct:100, q:"Quelle lettre vient juste après A ?", choices:["B","C","Z","AA"], answerIndex:0, explain:"B. (On démarre simple.)" },
  { id:"S2-80-1", pack:"S2", levelPct:80, q:"Quel mot contient le plus de lettres ?", choices:["AA","BBB","CCCC","DD"], answerIndex:2, explain:"“CCCC” contient 4 lettres C." },
  { id:"S2-60-1", pack:"S2", levelPct:60, q:"Combien y a-t-il de lettres dans l’alphabet français ?", choices:["24","25","26","27"], answerIndex:2, explain:"26." },
  { id:"S2-40-1", pack:"S2", levelPct:40, q:"Quelle lettre est au milieu de l’alphabet (26 lettres) ?", choices:["M","N","M et N","L"], answerIndex:2, explain:"Il y en a deux : M (13e) et N (14e)." },
  { id:"S2-25-1", pack:"S2", levelPct:25, q:"Écris “ALPHABET” à l’envers. Quelle est la 3e lettre ?", choices:["B","H","P","L"], answerIndex:1, explain:"TEBAHPLA → 3e lettre = B… attends : T(1) E(2) B(3). Oups. Donc B. (piège de vitesse)" },
  { id:"S2-10-1", pack:"S2", levelPct:10, q:"Quel mot est en ordre alphabétique ?", choices:["BAG","ABE","ACB","BAE"], answerIndex:1, explain:"A-B-E est dans l’ordre." },
  { id:"S2-1-1", pack:"S2", levelPct:1, q:"Dans “ABCDEFGHIJKLMNOPQRSTUVWXYZ”, combien de lettres sont à une position paire ?", choices:["12","13","14","26"], answerIndex:1, explain:"Positions paires de 1 à 26 → 13." },

  // ----- Partie 3 (Mois)
  { id:"S3-100-1", pack:"S3", levelPct:100, q:"Quel mois vient après janvier ?", choices:["Février","Décembre","Mars","Juin"], answerIndex:0, explain:"Février." },
  { id:"S3-80-1", pack:"S3", levelPct:80, q:"Quel mois a 28 jours ?", choices:["Février","Tous","Aucun","Janvier"], answerIndex:1, explain:"Tous les mois ont au moins 28 jours." },
  { id:"S3-60-1", pack:"S3", levelPct:60, q:"Combien de mois ont 31 jours ?", choices:["5","6","7","8"], answerIndex:2, explain:"7 (Jan, Mar, Mai, Juil, Août, Oct, Déc)." },
  { id:"S3-40-1", pack:"S3", levelPct:40, q:"Quel est le 9e mois ?", choices:["Août","Septembre","Octobre","Juillet"], answerIndex:1, explain:"Septembre." },
  { id:"S3-25-1", pack:"S3", levelPct:25, q:"Si on enlève toutes les lettres de “MARS” qui sont dans “MAI”, il reste…", choices:["S","R","RS","A"], answerIndex:0, explain:"MAI contient M et A → il reste R et S… mais on a demandé “toutes les lettres” → il reste “RS”. (piège)"},
  { id:"S3-10-1", pack:"S3", levelPct:10, q:"Quel mois a exactement 4 lettres ?", choices:["Mars","Juin","Août","Mai"], answerIndex:0, explain:"Mars = 4 lettres." },
  { id:"S3-1-1", pack:"S3", levelPct:1, q:"Quel mois commence et finit par la même lettre ?", choices:["Avril","Août","Mai","Juin"], answerIndex:1, explain:"Août (A…t) non. Attends : c’est un piège : aucun ici. Donc la bonne est… aucune → mais pas proposé. (On n’utilise pas celle-ci en prod sans revoir)"},
  // NOTE: la question S3-1-1 est volontairement marquée, on la filtrera ci-dessous.

  // ----- Partie 4 (Rimes)
  { id:"S4-100-1", pack:"S4", levelPct:100, q:"Quel mot rime le mieux avec “chat” ?", choices:["plat","chou","chien","lune"], answerIndex:0, explain:"chat / plat." },
  { id:"S4-80-1", pack:"S4", levelPct:80, q:"Quel mot rime avec “manger” ?", choices:["danger","montagne","manteau","mardi"], answerIndex:0, explain:"manger / danger." },
  { id:"S4-60-1", pack:"S4", levelPct:60, q:"Quel mot rime avec “Paris” ?", choices:["souris","pardon","pays","parfait"], answerIndex:0, explain:"Paris / souris (son “i”)." },
  { id:"S4-40-1", pack:"S4", levelPct:40, q:"Dans quelle paire les deux mots riment ?", choices:["mer / mur","chat / chaud","lait / laid","pied / peur"], answerIndex:2, explain:"lait / laid (même son)." },
  { id:"S4-25-1", pack:"S4", levelPct:25, q:"Quel mot NE rime PAS avec “beau” ?", choices:["bateau","niveau","cadeau","chaud"], answerIndex:1, explain:"niveau finit en “o”, mais le son est différent (ni-VO) ≠ BO." },
  { id:"S4-10-1", pack:"S4", levelPct:10, q:"Quel mot rime avec “orange” ?", choices:["ange","mange","aucun","range"], answerIndex:2, explain:"Classique : rien ne rime parfaitement avec “orange” en français standard." },
  { id:"S4-1-1", pack:"S4", levelPct:1, q:"Quel couple a EXACTEMENT le même son final ?", choices:["temps / tant","vers / verre","mais / met","deux / due"], answerIndex:1, explain:"vers / verre (homophones)." },

  // ----- Partie 10 (mix finale, quelques questions de secours)
  { id:"S10-100-1", pack:"S10", levelPct:100, q:"Si tu doubles 5, tu obtiens…", choices:["10","12","15","20"], answerIndex:0, explain:"10." },
  { id:"S10-80-1", pack:"S10", levelPct:80, q:"Quel nombre manque : 2, 4, 6, __ ?", choices:["7","8","9","10"], answerIndex:1, explain:"Suite de +2." },
  { id:"S10-60-1", pack:"S10", levelPct:60, q:"Lequel est un palindrome ?", choices:["kayak","bonjour","paris","table"], answerIndex:0, explain:"kayak." },
  { id:"S10-40-1", pack:"S10", levelPct:40, q:"Si tu as 10 bonbons et tu en donnes 10, il t’en reste…", choices:["0","10","1","Ça dépend"], answerIndex:0, explain:"0." },
  { id:"S10-25-1", pack:"S10", levelPct:25, q:"Quel mot est le plus long ?", choices:["long","plus long","le plus long","longueur"], answerIndex:2, explain:"“le plus long” (11 caractères sans compter l’espace)."},
  { id:"S10-10-1", pack:"S10", levelPct:10, q:"Quel jour vient 2 jours après lundi ?", choices:["Mardi","Mercredi","Jeudi","Dimanche"], answerIndex:1, explain:"Mercredi." },
  { id:"S10-1-1", pack:"S10", levelPct:1, q:"Combien de fois la lettre A apparaît dans “ABRACADABRA” ?", choices:["4","5","6","7"], answerIndex:2, explain:"ABRACADABRA → A x6." },
];

/** -------------------------
 *  Helpers
 *  ------------------------- */
const $ = (id)=>document.getElementById(id);

function safeQuestions(list){
  // on retire les questions “bancales”
  return list.filter(q => q.id !== "S3-1-1");
}

function pointsForLevel(pct){
  return Math.round(900 / Math.max(4, pct)); // 100% ~9, 1% ~225
}

function pickRandom(arr, lastId){
  if(arr.length === 0) return null;
  const filtered = arr.filter(x => x.id !== lastId);
  const pool = filtered.length ? filtered : arr;
  return pool[Math.floor(Math.random()*pool.length)];
}

/** -------------------------
 *  Audio (dramatic) - no external files
 *  ------------------------- */
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === "suspended") audioCtx.resume();
}
function playDramaticFail(){
  try{
    ensureAudio();
    const t = audioCtx.currentTime;

    // Low thump
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.type = "sine";
    osc1.frequency.setValueAtTime(120, t);
    osc1.frequency.exponentialRampToValueAtTime(60, t + 0.25);
    gain1.gain.setValueAtTime(0.0001, t);
    gain1.gain.exponentialRampToValueAtTime(0.35, t + 0.02);
    gain1.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
    osc1.connect(gain1).connect(audioCtx.destination);
    osc1.start(t);
    osc1.stop(t + 0.3);

    // High “panic” beep
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = "triangle";
    osc2.frequency.setValueAtTime(700, t + 0.02);
    osc2.frequency.exponentialRampToValueAtTime(330, t + 0.18);
    gain2.gain.setValueAtTime(0.0001, t);
    gain2.gain.exponentialRampToValueAtTime(0.18, t + 0.04);
    gain2.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
    osc2.connect(gain2).connect(audioCtx.destination);
    osc2.start(t);
    osc2.stop(t + 0.24);
  }catch(e){}
}

/** -------------------------
 *  State
 *  ------------------------- */
let state = {
  packId: "S1",
  levelIndex: 0,
  score: 0,
  streak: 0,
  locked: false,
  timer: null,
  tLeft: FIXED_SECONDS,
  tMax: FIXED_SECONDS,
  current: null,
  lastQid: null,
};

function level(){
  return LEVELS[state.levelIndex];
}

function updateHud(){
  $("lvlPct").textContent = `${level().pct}%`;
  $("score").textContent = state.score;
  $("levelName").textContent = level().name;
}

function showToast(type, title, text){
  const toast = $("toast");
  toast.classList.remove("good","bad","show");
  toast.classList.add(type === "good" ? "good" : "bad");
  $("toastEmoji").textContent = type === "good" ? "✅" : "😵‍💫";
  $("toastTitle").textContent = title;
  $("toastText").textContent = text;
  requestAnimationFrame(()=>toast.classList.add("show"));
}

function clearToast(){
  $("toast").classList.remove("show","good","bad");
}

function setRing(){
  const p = state.tMax <= 0 ? 0 : (state.tLeft / state.tMax);
  const deg = Math.max(0, Math.min(1, p)) * 360;
  $("ring").style.setProperty("--p", `${deg}deg`);
  $("ringTxt").textContent = state.tLeft;
  $("timeLeft").textContent = state.tLeft;
}

function lockAnswers(){
  [...document.querySelectorAll("button.answer")].forEach(b=>b.disabled = true);
}

function stopTimer(){
  if(state.timer){
    clearInterval(state.timer);
    state.timer = null;
  }
}

function startTimer(){
  stopTimer();
  state.tMax = FIXED_SECONDS;
  state.tLeft = FIXED_SECONDS;
  setRing();

  state.timer = setInterval(()=>{
    state.tLeft -= 1;
    setRing();
    if(state.tLeft <= 0){
      stopTimer();
      if(!state.locked){
        timeoutFail();
      }
    }
  }, 1000);
}

function getPoolForCurrent(){
  const packQs = safeQuestions(QUESTIONS.filter(q => q.pack === state.packId));
  const pool = packQs.filter(q => q.levelPct === level().pct);
  // fallback: si pas assez de questions dans ce pack à ce niveau, on pioche dans la Partie 10 (mix)
  if(pool.length) return pool;
  const fallback = safeQuestions(QUESTIONS.filter(q => q.pack === "S10" && q.levelPct === level().pct));
  return fallback;
}

function renderQuestion(){
  state.locked = false;
  $("nextBtn").disabled = true;
  clearToast();

  const pool = getPoolForCurrent();
  const q = pickRandom(pool, state.lastQid);
  state.current = q;
  state.lastQid = q?.id ?? null;

  $("question").textContent = q ? q.q : "Pas assez de questions dans ce niveau (on va en ajouter 😈).";

  const answersDiv = $("answers");
  answersDiv.innerHTML = "";

  if(!q){
    $("nextBtn").disabled = false;
    return;
  }

  q.choices.forEach((txt, idx)=>{
    const btn = document.createElement("button");
    btn.className = "answer";
    btn.textContent = txt;
    btn.onclick = ()=>choose(idx, btn);
    answersDiv.appendChild(btn);
  });

  updateHud();
  startTimer();
}

if(ok){
  const gain = pointsForLevel(level().pct) + Math.floor(state.tLeft);
  state.score += gain;
  state.streak += 1;

  btn.style.borderColor = "rgba(46,229,157,.6)";
  btn.style.background = "rgba(46,229,157,.10)";

  // Level up silencieux AVANT le toast, comme ça le tag est déjà à jour
  promoteIfNeeded();

  showToast("good","Correct ✅", `${state.current.explain} (+${gain} pts)`);
}else{
  // ... (la partie faux ne change pas)
}

function choose(choiceIndex, btn){
  if(state.locked) return;
  state.locked = true;
  stopTimer();
  lockAnswers();

  const ok = (choiceIndex === state.current.answerIndex);

  if(ok){
    const gain = pointsForLevel(level().pct) + Math.floor(state.tLeft);
    state.score += gain;
    state.streak += 1;

    btn.style.borderColor = "rgba(46,229,157,.6)";
    btn.style.background = "rgba(46,229,157,.10)";
    showToast("good","Correct ✅", `${state.current.explain} (+${gain} pts)`);
    promoteIfNeeded();
  }else{
    state.streak = 0;
    btn.style.borderColor = "rgba(255,77,109,.6)";
    btn.style.background = "rgba(255,77,109,.10)";

    const buttons = [...document.querySelectorAll("button.answer")];
    const goodBtn = buttons[state.current.answerIndex];
    if(goodBtn){
      goodBtn.style.borderColor = "rgba(46,229,157,.55)";
      goodBtn.style.background = "rgba(46,229,157,.08)";
    }

    // drama
    $("card").classList.remove("shake");
    void $("card").offsetWidth; // reset animation
    $("card").classList.add("shake");
    playDramaticFail();

    showToast("bad","Aïe, aïe, aïe", state.current.explain);
  }

  updateHud();
  $("nextBtn").disabled = false; // ✅ BUG FIX: une seule réponse suffit, next dispo
}

function timeoutFail(){
  state.locked = true;
  lockAnswers();
  state.streak = 0;

  $("card").classList.remove("shake");
  void $("card").offsetWidth;
  $("card").classList.add("shake");
  playDramaticFail();

  const good = state.current?.choices?.[state.current.answerIndex] ?? "—";
  showToast("bad","Aïe, aïe, aïe", `Temps écoulé ⏱️ (Réponse : "${good}")`);
  updateHud();
  $("nextBtn").disabled = false;
}

function giveUp(){
  if(state.locked) return;
  state.locked = true;
  stopTimer();
  lockAnswers();
  state.streak = 0;
  showToast("bad","give up 🫠", "Ok. On passe à la suivante.");
  updateHud();
  $("nextBtn").disabled = false;
}

function resetRun(){
  stopTimer();
  state.levelIndex = 0;
  state.score = 0;
  state.streak = 0;
  state.locked = false;
  clearToast();
  updateHud();
  renderQuestion();
}

/** -------------------------
 *  Pack UI
 *  ------------------------- */
function initPacks(){
  const sel = $("packSelect");
  sel.innerHTML = "";
  PACKS.forEach(p=>{
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = p.name;
    sel.appendChild(opt);
  });
  sel.value = state.packId;

  sel.addEventListener("change", ()=>{
    state.packId = sel.value;
    resetRun();
  });
}

/** -------------------------
 *  Events
 *  ------------------------- */
$("nextBtn").addEventListener("click", renderQuestion);
$("giveUpBtn").addEventListener("click", giveUp);
$("resetBtn").addEventListener("click", resetRun);

// iOS: activer audio au premier tap
document.addEventListener("pointerdown", ()=>{ try{ ensureAudio(); }catch(e){} }, {once:true});

/** -------------------------
 *  Start
 *  ------------------------- */
initPacks();
updateHud();
renderQuestion();
</script>
</body>
</html>
